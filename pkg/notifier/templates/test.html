<!DOCTYPE html>
<html>
    <head>
        <style>
            body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
            .container { max-width: 600px; margin: 0 auto; padding: 20px; }
            .header { background-color: #1976d2; color: white; padding: 20px; border-radius: 5px 5px 0 0; }
            .content { background-color: #f9f9f9; padding: 20px; border: 1px solid #ddd; border-top: none; }
            .detail { margin: 10px 0; }
            .label { font-weight: bold; color: #555; }
            .value { color: #333; }
            .footer { margin-top: 20px; padding-top: 20px; border-top: 1px solid #ddd; font-size: 12px; color: #777; }
        </style>
    </head>

    <body>
        <div class="container">
        <div class="header">
            <h2>ℹ️ Test Notification</h2>
        </div>
        <div class="content">
            <p>This is a test notification to verify the alerting system is functioning correctly.</p>

            <div class="detail"><span class="label">Message:</span> <span class="value">{{ .Message }}</span></div>
            <div class="detail"><span class="label">Timestamp:</span> <span class="value">{{ .Timestamp }}</span></div>

            <p style="margin-top: 20px;">
                <strong>No action is required.</strong>
            </p>
        </div>
        <div class="footer">
            <p>This is an automated test alert from Ogoune monitoring system.</p>
        </div>
    </div>
    </body>
</html>

name: ogoune

volumes:
  ogoune-data:

services:
  ogoune:
    image: ghcr.io/denisakp/ogoune:latest
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      DB_DRIVER: sqlite
      SQLITE_PATH: /data/ogoune.db
      DB_LOG_LEVEL: error
      # Scheduler runs in-process without Redis
      SCHEDULER_MODE: timingwheel
      SCHEDULER_MAX_WORKERS: 10
      SCHEDULER_TICK_INTERVAL: 1s
      SCHEDULER_SHUTDOWN_TIMEOUT: 30s
      STATIC_DIR: /app/static
      PORT: 8080
    volumes:
      - ogoune-data:/data
# Project identity
sonar.projectKey=ogoune
sonar.projectName=Ogoune
sonar.sourceEncoding=UTF-8

# SonarQube server
sonar.host.url=https://sonarqube.orb.local

# Sources and tests (monorepo)
sonar.sources=cmd,internal,pkg,web/src
sonar.tests=internal,pkg,web/src

# Test file patterns
sonar.test.inclusions=**/*_test.go,web/src/**/*.spec.ts,web/src/**/*.test.ts

# Global exclusions (generated/build/vendor)
sonar.exclusions=**/vendor/**,**/node_modules/**,**/web/dist/**,**/docs/**,**/*.pb.go,**/testdata/**,**/dist/**,**/coverage/**

# Optional: exclude non-critical zones from coverage target
sonar.coverage.exclusions=**/vendor/**,**/node_modules/**,**/web/dist/**,**/*.pb.go,**/testdata/**

# Go coverage report
sonar.go.coverage.reportPaths=coverage/unit.out

# Frontend (TS/Vue) coverage report (Vitest/Jest lcov)
sonar.javascript.lcov.reportPaths=web/coverage/lcov.info
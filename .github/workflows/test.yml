name: Run Tests

on:
  push:
    branches:
      - dev
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'web/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches:
      - dev
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'web/**'
      - '.github/workflows/test.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DB_DRIVER: sqlite
      SQLITE_PATH: /tmp/ogoune-ci.db
      DB_LOG_LEVEL: error
    steps:
      - uses: actions/checkout@v6
      
      - name: setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.1'
      
      - name: cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
            ~/go/bin
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: sqlc check (fail on drift)
        run: make sqlc-check

      - name: migrations drift check
        run: make migrations-drift-check

      - name: run tests
        run: go test -C . -v -race -timeout 120s ./...

name: Run Tests

on:
  push:
    branches:
      - dev
    paths:
      - 'backend/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches:
      - dev
    paths:
      - 'backend/**'
      - '.github/workflows/test.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.1'
      
      - name: cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      
      - name: run tests
        run: go test -C ./backend -v -race ./...

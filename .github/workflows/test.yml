name: Run Tests

on:
  push:
    branches:
      - dev
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'web/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches:
      - dev
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'web/**'
      - '.github/workflows/test.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DB_DRIVER: sqlite
      SQLITE_PATH: /tmp/ogoune-ci.db
      DB_LOG_LEVEL: error
    steps:
      - uses: actions/checkout@v6

      - name: setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.1'

      - name: cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
            ~/go/bin
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: sqlc check (fail on drift)
        run: make sqlc-check

      - name: migrations drift check
        run: make migrations-drift-check

      - name: run tests
        run: go test -C . -v -race -timeout 120s ./...

      - name: concurrent-update soak (spec 049 US3 — race detector ON)
        run: go test -race -count=1 -timeout 90s -run TestResourceRepository_Update_ConcurrentSoak ./internal/repository/store/...

  test-be-postgres:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.1'

      - name: cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
            ~/go/bin
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: pre-pull postgres image
        run: docker pull postgres:16-alpine

      - name: dual-dialect tests (Postgres + SQLite via testcontainers)
        run: make test-be-pg

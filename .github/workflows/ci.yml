name: Build and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    env:
      DB_DRIVER: sqlite
      SQLITE_PATH: /tmp/ogoune-ci.db
      DB_LOG_LEVEL: error
    steps:
      - uses: actions/checkout@v6

      - name: setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.1'

      - name: cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
            ~/go/bin
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: sqlc check (fail on drift)
        run: make sqlc-check

      - name: migrations drift check
        run: make migrations-drift-check

      - name: run backend tests
        run: go test -C ./ ./...

  test-be-postgres:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.1'

      - name: cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
            ~/go/bin
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: pre-pull postgres image
        run: docker pull postgres:16-alpine

      - name: dual-dialect tests (Postgres + SQLite via testcontainers)
        run: make test-be-pg

  test-be-sqlc-tags:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SQLC_TAGS: "true"
    steps:
      - uses: actions/checkout@v6

      - name: setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.1'

      - name: cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
            ~/go/bin
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: pre-pull postgres image
        run: docker pull postgres:16-alpine

      - name: dual-dialect tests with SQLC_TAGS=true
        run: make test-be-pg

  test-be-sqlc-wave1:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SQLC_API_KEY: "true"
      SQLC_USER: "true"
      SQLC_NOTIFICATION_CHANNEL: "true"
      SQLC_EXPIRY_NOTIFICATION_LOG: "true"
      SQLC_STATUSPAGE_SETTINGS: "true"
      SQLC_INCIDENT_DIAGNOSTICS: "true"
      SQLC_RESOURCE_CREDENTIAL: "true"
    steps:
      - uses: actions/checkout@v6

      - name: setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.1'

      - name: cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
            ~/go/bin
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: pre-pull postgres image
        run: docker pull postgres:16-alpine

      - name: dual-dialect tests with all Wave-1 flags ON
        run: make test-be-pg

  build-and-push:
    needs: backend-tests
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    
    env:
      IMAGE_NAME: ogoune
      REGISTRY: ghcr.io
    
    outputs:
      image_repo: ${{ steps.vars.outputs.image_repo }}
      short_sha: ${{ steps.vars.outputs.short_sha }}
      digest: ${{ steps.build.outputs.digest }}
    
    steps:
      - uses: actions/checkout@v6
      
      - name: setup variables
        id: vars
        run: |
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner_lower=$OWNER_LOWER" >> "$GITHUB_OUTPUT"
          echo "image_repo=${{ env.REGISTRY }}/$OWNER_LOWER/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"
      
      - uses: docker/setup-buildx-action@v4
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: build and push image to registry
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          cache-from: type=gha,scope=${{ env.IMAGE_NAME }}
          cache-to: type=gha,mode=max,scope=${{ env.IMAGE_NAME }}
          tags: |
            ${{ steps.vars.outputs.image_repo }}:${{ steps.vars.outputs.short_sha }}
            ${{ steps.vars.outputs.image_repo }}:latest

  update-tag:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v6
      
      - name: Install jq and yq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq && chmod +x /usr/local/bin/yq
          yq --version
          jq --version
      
      - name: update docker-compose
        run: |
          set -euo pipefail
          
          IMAGE_REPO="${{ needs.build-and-push.outputs.image_repo }}"
          SHORT_SHA="${{ needs.build-and-push.outputs.short_sha }}"
          
          export IMAGE_REPO
          export OGOUNE_IMAGE="${IMAGE_REPO}:${SHORT_SHA}"

          yq -i ".services.ogoune.image = \"${OGOUNE_IMAGE}\"" docker-compose.yml
          
          if ! git diff --quiet docker-compose.yml; then
            echo "Changes detected:"
            git diff docker-compose.yml
          else
            echo "No changes detected, skipping commit"
            exit 0
          fi
          
      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update image digest for ogoune [skip ci]"
          branch: main
          file_pattern: docker-compose.yml

  test-be-sqlc-wave2:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SQLC_TAGS: "true"
      SQLC_API_KEY: "true"
      SQLC_USER: "true"
      SQLC_NOTIFICATION_CHANNEL: "true"
      SQLC_EXPIRY_NOTIFICATION_LOG: "true"
      SQLC_STATUSPAGE_SETTINGS: "true"
      SQLC_INCIDENT_DIAGNOSTICS: "true"
      SQLC_RESOURCE_CREDENTIAL: "true"
      SQLC_COMPONENT: "true"
      SQLC_MAINTENANCE: "true"
      SQLC_NOTIFICATION: "true"
      SQLC_MONITORING_ACTIVITY: "true"
      SQLC_INCIDENT_EVENT_STEP: "true"
    steps:
      - uses: actions/checkout@v6
      - name: setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.1'
      - name: cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
            ~/go/bin
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: pre-pull postgres image
        run: docker pull postgres:16-alpine
      - name: dual-dialect tests with all Wave-2 flags ON
        run: make test-be-pg

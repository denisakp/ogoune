name: Release

# Fires when a version tag is pushed (e.g. v1.0.0-beta, v1.0.0).
# Builds a multi-arch image, publishes it to GHCR, and cuts a GitHub Release
# from the matching release-notes/<tag>.md file.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push to GHCR

env:
  IMAGE_NAME: ogoune
  REGISTRY: ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: setup variables
        id: vars
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image_repo=${{ env.REGISTRY }}/$OWNER_LOWER/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"
          # A tag containing a hyphen is a prerelease (v1.0.0-beta, v1.2.0-rc.1).
          # Prereleases never move the `latest` tag and are flagged on the Release.
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: verify release notes exist
        run: |
          set -euo pipefail
          NOTES="release-notes/${{ steps.vars.outputs.version }}.md"
          if [[ ! -f "$NOTES" ]]; then
            echo "::error::Missing $NOTES — add the release notes before tagging ${{ steps.vars.outputs.version }}."
            exit 1
          fi

      - name: compute image tags
        id: tags
        run: |
          set -euo pipefail
          REPO="${{ steps.vars.outputs.image_repo }}"
          TAGS="${REPO}:${{ steps.vars.outputs.version }}"
          if [[ "${{ steps.vars.outputs.prerelease }}" == "false" ]]; then
            TAGS="${TAGS},${REPO}:latest"
          fi
          echo "list=$TAGS" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build and push multi-arch image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=${{ env.IMAGE_NAME }}
          cache-to: type=gha,mode=max,scope=${{ env.IMAGE_NAME }}
          tags: ${{ steps.tags.outputs.list }}

      - name: create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.vars.outputs.version }}
          body_path: release-notes/${{ steps.vars.outputs.version }}.md
          prerelease: ${{ steps.vars.outputs.prerelease }}
          generate_release_notes: false
